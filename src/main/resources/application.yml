micronaut:
  application:
    name: oda-widget-service
  security:
    token:
      bearer:
        enabled: true
      cookie:
        enabled: true
      jwt:
        signatures:
          jwks:
            keycloak:
              url: ${JWKS_URI}
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
flyway:
  datasources:
    default:
      enabled: true
jpa:
  default:
    entity-scan:
        packages: 'io.github.opendonationassistant.widget'
infinispan.url: ${INFINISPAN_HOST:`127.0.0.1`}
endpoints:
  prometheus:
    sensitive: false
  metrics:
    sensitive: false
